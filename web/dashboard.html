<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReAct Packet Dashboard</title>
  <style>
    :root {
      --bg: #0d1321;
      --panel: #121a2c;
      --text: #ebf2ff;
      --muted: #95a6c8;
      --accent: #5fd0ff;
      --user: #56d2ff;
      --req: #7fffd4;
      --resp: #7be495;
      --agent: #f9c74f;
      --tool: #ff8fab;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(95, 208, 255, 0.15), transparent 40%),
        radial-gradient(circle at 90% 0%, rgba(255, 143, 171, 0.18), transparent 35%),
        linear-gradient(130deg, #0d1321 0%, #101a31 55%, #0f1d2f 100%);
      color: var(--text);
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      letter-spacing: 0.04em;
      font-size: clamp(24px, 3vw, 36px);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(18, 26, 44, 0.95), rgba(15, 22, 37, 0.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar input, .toolbar button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #131d34;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }

    .toolbar button {
      background: linear-gradient(135deg, #1c95d2, #176cb9);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .toolbar button:hover { transform: translateY(-1px); }

    .group-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-height: 70vh;
      overflow: auto;
      padding-right: 6px;
    }

    .group {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(13, 19, 33, 0.72);
      overflow: hidden;
    }

    .group-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      background: rgba(19, 29, 52, 0.8);
    }

    .group-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-meta {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .group-body {
      display: none;
      padding: 10px 12px;
    }

    .group.open .group-body {
      display: block;
    }

    .packet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-left: 6px solid var(--accent);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(13, 19, 33, 0.72);
      animation: fadeIn 180ms ease-out;
    }

    .card.user { border-left-color: var(--user); }
    .card.llm_request { border-left-color: var(--req); }
    .card.llm_response { border-left-color: var(--resp); }
    .card.agent { border-left-color: var(--agent); }
    .card.tool { border-left-color: var(--tool); }

    .card-head {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      margin-bottom: 8px;
      font-size: 12px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.45;
      color: var(--text);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .danger {
      background: linear-gradient(135deg, #c73e5a, #a3223b) !important;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">ReAct Packet Dashboard</h1>
    <div id="status" class="status">等待加载...</div>
  </header>

  <section class="panel">
    <div class="toolbar">
      <label>显示条数
        <input id="limit" type="number" value="200" min="20" step="20" />
      </label>
      <button id="refresh">刷新</button>
      <button id="toggle">暂停自动刷新</button>
      <button id="clear" class="danger">清空日志</button>
    </div>
    <div id="packets" class="group-list"></div>
  </section>

  <script>
    const packetsEl = document.getElementById("packets");
    const statusEl = document.getElementById("status");
    const limitEl = document.getElementById("limit");
    const refreshBtn = document.getElementById("refresh");
    const toggleBtn = document.getElementById("toggle");
    const clearBtn = document.getElementById("clear");

    let polling = true;
    let lastSignature = "";

    function renderPacket(packet) {
      const card = document.createElement("article");
      card.className = `card ${packet.type || "other"}`;

      const head = document.createElement("div");
      head.className = "card-head";
      const left = document.createElement("span");
      left.textContent = packet.type || "unknown";
      const right = document.createElement("span");
      right.textContent = `iter=${packet.iteration ?? "-"}`;
      head.append(left, right);

      const body = document.createElement("pre");
      body.textContent = JSON.stringify(packet, null, 2);

      card.append(head, body);
      return card;
    }

    function renderGroup(group) {
      const wrapper = document.createElement("section");
      wrapper.className = "group";
      wrapper.dataset.groupId = String(group.id);
      wrapper.dataset.signature = `${group.packet_count}|${group.question || ""}`;

      const head = document.createElement("div");
      head.className = "group-head";
      const title = document.createElement("div");
      title.className = "group-title";
      title.textContent = `Q${group.id}: ${group.question || "(empty question)"}`;
      const meta = document.createElement("div");
      meta.className = "group-meta";
      const toolCount = group.type_counts?.tool || 0;
      meta.textContent = `packets=${group.packet_count} | tools=${toolCount}`;
      head.append(title, meta);

      const body = document.createElement("div");
      body.className = "group-body";
      const grid = document.createElement("div");
      grid.className = "packet-grid";
      (group.packets || []).forEach((packet) => grid.appendChild(renderPacket(packet)));
      body.appendChild(grid);
      wrapper.append(head, body);

      head.addEventListener("click", () => {
        wrapper.classList.toggle("open");
      });

      return wrapper;
    }

    function updateGroupElement(el, group) {
      const nextSignature = `${group.packet_count}|${group.question || ""}`;
      if (el.dataset.signature === nextSignature) {
        return el;
      }
      const open = el.classList.contains("open");
      const nextEl = renderGroup(group);
      if (open) nextEl.classList.add("open");
      return nextEl;
    }

    function renderGroupsIncremental(groups) {
      const existing = new Map(
        Array.from(packetsEl.children).map((el) => [el.dataset.groupId, el])
      );
      const nextIds = new Set(groups.map((g) => String(g.id)));

      for (const el of Array.from(packetsEl.children)) {
        if (!nextIds.has(el.dataset.groupId)) {
          el.remove();
        }
      }

      groups.forEach((group, idx) => {
        const id = String(group.id);
        const current = existing.get(id);
        const nextEl = current ? updateGroupElement(current, group) : renderGroup(group);
        if (idx === groups.length - 1 && !Array.from(packetsEl.children).length) {
          nextEl.classList.add("open");
        }
        const atIndex = packetsEl.children[idx];
        if (atIndex !== nextEl) {
          packetsEl.insertBefore(nextEl, atIndex || null);
        }
      });
    }

    async function loadGroups() {
      const limit = Number(limitEl.value || 200);
      const resp = await fetch(`/api/groups?limit=${encodeURIComponent(limit)}`);
      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const signature = JSON.stringify(data.groups.map((g) => [g.id, g.packet_count, g.question]));
      if (signature !== lastSignature) {
        renderGroupsIncremental(data.groups);
        lastSignature = signature;
      }
      const packetCount = data.groups.reduce((acc, g) => acc + (g.packet_count || 0), 0);
      statusEl.textContent = `日志文件: ${data.log_path} | 问题组: ${data.groups.length} | 报文数: ${packetCount} | ${new Date().toLocaleTimeString()}`;
    }

    async function refresh() {
      try {
        await loadGroups();
      } catch (err) {
        statusEl.textContent = `加载失败: ${err.message}`;
      }
    }

    refreshBtn.addEventListener("click", refresh);
    toggleBtn.addEventListener("click", () => {
      polling = !polling;
      toggleBtn.textContent = polling ? "暂停自动刷新" : "恢复自动刷新";
    });
    clearBtn.addEventListener("click", async () => {
      try {
        const resp = await fetch("/api/clear", { method: "POST" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        packetsEl.innerHTML = "";
        lastSignature = "";
        await refresh();
      } catch (err) {
        statusEl.textContent = `清空失败: ${err.message}`;
      }
    });

    refresh();
    setInterval(() => {
      if (polling) refresh();
    }, 1500);
  </script>
</body>
</html>
